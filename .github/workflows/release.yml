name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Official builds bake in the maintainer's OAuth client ids; forks
          # without these secrets still build, but the Google/Microsoft sign-in
          # buttons stay hidden (set the env vars before building to enable them).
          SKIM_GOOGLE_CLIENT_ID: ${{ secrets.SKIM_GOOGLE_CLIENT_ID }}
          SKIM_GOOGLE_CLIENT_SECRET: ${{ secrets.SKIM_GOOGLE_CLIENT_SECRET }}
          SKIM_MICROSOFT_CLIENT_ID: ${{ secrets.SKIM_MICROSOFT_CLIENT_ID }}
          # Updater artifact signing. With createUpdaterArtifacts enabled the
          # build FAILS without these — forks must bring their own keypair or
          # drop the updater config from tauri.conf.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Skim ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          # latest.json must point auto-updaters at the NSIS installer; the
          # default here is the MSI, which would silently migrate everyone.
          updaterJsonPreferNsis: true
